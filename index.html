<style>
.wa{
position:fixed;
bottom:80px;
right:20px;
width:70px;
height:70px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 30px rgba(0,0,0,.35);
z-index:999;
transition:.3s;
}

.wa:hover{
transform:scale(1.08);
}

.wa-img{
width:36px;
height:36px;
filter:drop-shadow(0 3px 6px rgba(0,0,0,.4));
}
body{

background:#f5f6f8;
transition:0.4s;
}

/* DARK AMOLED */
.dark{
background:#000;
color:white;
}

.dark .header{background:#000;}
.dark .catnav{background:#000;}
.dark .card{background:#0f0f0f;box-shadow:none;}
.dark .progress{background:#222;}
.dark .visit{background:#16a34a;}
.dark .toast{background:#0f0f0f;color:white;}
.dark .hero::after{
background:linear-gradient(to bottom,rgba(0,0,0,0.4),rgba(0,0,0,0.9));
}

/* HEADER */
.header{
background:linear-gradient(90deg,#42b549,#2ea043);
padding:8px 16px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:10;
box-shadow:0 12px 30px rgba(0,0,0,.18);
}

.logo-img{
height:64px;
background:white;
padding:6px 10px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,.25);
transition:.3s;
}

.logo-img:hover{
transform:scale(1.05);
}

.toggle{
background:white;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
font-size:18px;
}

/* HERO */
.hero{
height:340px;
position:relative;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
opacity:0;
transition:1s;
transform:scale(1.05);
}

.hero img.active{opacity:1}

.hero::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to bottom,rgba(0,0,0,0.1),rgba(0,0,0,0.6));
}

.hero-text{
position:absolute;
bottom:30px;
left:25px;
color:white;
z-index:2;
}

.hero-text h1{
margin:0;
font-size:30px;
}

.hero-btn{
display:inline-block;
margin-top:12px;
background:#42b549;
padding:12px 20px;
border-radius:12px;
color:white;
text-decoration:none;
box-shadow:0 10px 25px rgba(66,181,73,.5);
position:relative;
overflow:hidden;
}

.hero-btn::after{
content:"";
position:absolute;
left:-120%;
top:0;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.8),transparent);
animation:glow 3s infinite;
}

@keyframes glow{
0%{left:-120%}
100%{left:120%}
}

/* CATEGORY */
.catnav{
position:sticky;
top:72px;
background:white;
padding:10px;
display:flex;
gap:10px;
overflow:auto;
}

.catnav div{
background:#eee;
padding:8px 14px;
border-radius:20px;
white-space:nowrap;
}

/* TITLE */
.title{
padding:20px;
font-size:22px;
font-weight:bold;
}

.visitor{
padding:0 20px;
color:#42b549;
font-weight:bold;
}

/* CARD */
.list{padding:20px;}

.card{
background:white;
padding:15px;
border-radius:14px;
margin-bottom:15px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
transition:.35s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 20px 40px rgba(0,0,0,.18);
}

.rating{
color:#ffb400;
font-size:14px;
}

.progress{
height:8px;
background:#eee;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.bar{
height:8px;
background:#42b549;
width:60%;
}

.visit{
display:inline-block;
margin-top:10px;
background:#42b549;
color:white;
padding:8px 14px;
border-radius:8px;
text-decoration:none;
}

.load{
display:block;
margin:20px auto;
padding:10px 20px;
background:#42b549;
color:white;
border:none;
border-radius:8px;
}

/* STICKY CTA */
.sticky-cta{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
padding:10px;
box-shadow:0 -8px 25px rgba(0,0,0,.2);
display:none;
z-index:99;
transition:.4s;
}

.sticky-btn{
background:#42b549;
color:white;
text-align:center;
padding:14px;
border-radius:12px;
font-weight:bold;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

/* WA */
.wa{
position:fixed;
bottom:80px;
right:20px;
width:65px;
height:65px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

/* TOAST */
.toast-container{
position:fixed;
left:15px;
bottom:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.toast{
background:white;
padding:12px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
animation:slide .4s;
}

@keyframes slide{
from{transform:translateX(-30px);opacity:0}
to{transform:translateX(0);opacity:1}
}

/* RIPPLE */
@keyframes ripple{
0%{transform:scale(0);opacity:.5}
100%{transform:scale(6);opacity:0}
}

@media(max-width:600px){
.hero{height:250px;}
.logo-img{height:52px;}
.hero-text h1{font-size:22px;}
}

</style>

<script>

/* AUTO DARK */
let hour=new Date().getHours();
if(hour>=18){
document.body.classList.add("dark");
document.getElementById("toggleBtn").innerHTML="☀️";
}

function toggleDark(){
document.body.classList.toggle("dark");
document.getElementById("toggleBtn").innerHTML=
document.body.classList.contains("dark")?"☀️":"🌙";
}

/* SLIDER */
let s=0;
setInterval(()=>{
let imgs=document.querySelectorAll(".hero img");
imgs.forEach(i=>i.classList.remove("active"));
s=(s+1)%imgs.length;
imgs[s].classList.add("active");
},3000);

/* VISITOR */
setInterval(()=>{
document.getElementById("visitor").innerHTML="👥 "+Math.floor(Math.random()*150+80)+" orang sedang melihat";
},2000);

/* HERO VISITOR */
setInterval(()=>{
document.getElementById("heroVisitor").innerHTML=
"👥 "+Math.floor(Math.random()*120+90)+" orang melihat";
},3000);

/* LOAD */
function loadMore(){
let box=document.getElementById("list");
for(let i=0;i<3;i++){
box.innerHTML+=`
<div class="card">
<div class="rating">⭐⭐⭐⭐⭐ (${Math.floor(Math.random()*2000)} review)</div>
<h3>Promo Benefit Member</h3>
<div class="progress"><div class="bar" style="width:${Math.floor(Math.random()*90+10)}%"></div></div>
<a class="visit" href="https://mbob.in/rtpsuhu69" target="_blank">Kunjungi</a>
</div>`;
}
}

/* PROGRESS MOVE */
setInterval(()=>{
document.querySelectorAll(".bar").forEach(el=>{
let w=Math.floor(Math.random()*20+60);
el.style.width=w+"%";
});
},4000);

/* USER SENSOR */
function generateUser(){
let p=["tet","ews","opo","rak","zen","mik","lor","dap","vin","kas","rop","vio","ala"];
let t=p[Math.floor(Math.random()*p.length)];
let l=Math.floor(Math.random()*4)+3;
for(let i=0;i<l;i++){t+="x";}
return t;
}

function toast(){
let t=document.getElementById("toast");
let el=document.createElement("div");
let city=["Jakarta","Medan","Surabaya","Bandung","Jambi","Palembang","Äceh","Pekan Baru","Jogjakarta","Bali"];
let amt=(Math.floor(Math.random()*500+50)*1000).toLocaleString("id-ID");

el.className="toast";
el.innerHTML="✅ "+generateUser()+" dari "+city[Math.floor(Math.random()*city.length)]+" klaim Rp"+amt;

t.appendChild(el);
document.getElementById("sound").play();
setTimeout(()=>{el.remove()},4000);
}

setInterval(toast,4500);


/* ==== EXIT POPUP IMAGE SMART ==== */

let popupShown = false;

function showBannerPopup(){

if(popupShown) return;
popupShown = true;

let overlay = document.createElement("div");
overlay.id = "popupOverlay";

overlay.style = `
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.85);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
`;

overlay.innerHTML = `
<div id="popupBox" style="
position:relative;
max-width:520px;
width:92%;
animation:zoomIn .35s;
">

<img src="POPUP.png"
style="width:100%;border-radius:16px;cursor:pointer"
onclick="window.open('https://mbob.in/rtpsuhu69','_blank')">

<div id="popupClose"
style="
position:absolute;
top:-12px;
right:-12px;
width:36px;
height:36px;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-weight:bold;
box-shadow:0 5px 20px rgba(0,0,0,.4);
">✕</div>

</div>
`;

document.body.appendChild(overlay);

/* CLOSE BUTTON */
document.getElementById("popupClose").onclick = ()=>{
overlay.remove();
};


}

/* DESKTOP EXIT */
document.addEventListener("mouseout",e=>{
if(e.clientY < 10 && !popupShown){
setTimeout(showBannerPopup,600);
}
});

/* MOBILE DELAY */
setTimeout(()=>{
if(window.innerWidth < 768 && !popupShown){
showBannerPopup();
}
},9000);

</script>
